version: "3.9"

services:
  bot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist memory across container restarts
      - ./memory:/project/memory
      # Mount prompts for hot-reload during development
      - ./prompts:/project/prompts:ro
      # Mount scripts for CC to call
      - ./scripts:/project/scripts:ro
    restart: unless-stopped
